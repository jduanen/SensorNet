substitutions:
  device_name: env-sensors
  friendly_name: "Environmental Sensors Upstairs"
  comment: "Air Quality, Temperature, Humidity, and CO2 Sensor in Upstairs Hallway"
  log_level: WARN

esphome:
  on_boot:
      priority: 800
      then:
        - wifi.disable:
        - output.turn_off: rf_switch_power
        - delay: 100ms
        - switch.turn_on: antenna_select
        - wifi.enable:

packages:
  wifi_ws_conf: github://jduanen/SensorNet/common/wifi_ws.yaml

esp32:
  board: seeed_xiao_esp32c6
  variant: ESP32C6
  framework:
    type: esp-idf

output:
  - platform: gpio
    pin: GPIO3
    id: rf_switch_power

switch:
  - platform: gpio
    pin: GPIO14
    id: antenna_select
    restore_mode: ALWAYS_OFF 
    name: "External Wifi Antenna On/Off"

i2c:
  id: i2cBus
  sda: GPIO22
  scl: GPIO23
  scan: true
  frequency: 50kHz  #### 50kHz 100kHz, 400kHz

sensor:
  - platform: aht10
    variant: AHT20
    i2c_id: i2cBus
    address: 0x38
    temperature:
      name: "AHT21 Temperature"
    humidity:
      name: "AHT21 Humidity"
    update_interval: 60s
  - platform: ens160_i2c
    i2c_id: i2cBus
    address: 0x53
    eco2:
      name: "ENS160 eCO2"
    tvoc:
      name: "ENS160 TVOC"
    aqi:
      name: "ENS160 AQI"
    update_interval: 60s
  - platform: sen5x  # For SEN55, SEN54, SEN50
    i2c_id: i2cBus
    address: 0x69
    pm_1_0:
      name: "PM <1.0µm"
      id: pm1
    pm_2_5:
      name: "PM <2.5µm"
      id: pm2_5
    pm_4_0:
      name: "PM <4.0µm"
      id: pm4
    pm_10_0:
      name: "PM <10.0µm"
      id: pm10
    voc:
      name: "VOC Index"
      id: voc_index
    nox:
      name: "NOx Index"
      id: nox_index
    temperature:
      name: "SEN55 Temperature"
      id: sen55_temp
    humidity:
      name: "SEN55 Humidity"
      id: sen55_humid
    update_interval: 60s
  - platform: aqi
    name: "Air Quality Index"
    pm_2_5: pm2_5
    pm_10_0: pm10
    calculation_type: AQI
