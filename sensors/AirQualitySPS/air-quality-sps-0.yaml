substitutions:
  device_name: air-quality-sps-0
  friendly_name: "Air Quality MWR"
  comment: "Air Quality Sensor (SPS) in Monica Workroom"
  log_level: WARN

esp8266:
  board: esp01_1m

packages:
  wifi_ws_conf: github://jduanen/SensorNet/common/wifi_ws.yaml

i2c:
  sda: GPIO4
  scl: GPIO5
  scan: false
  frequency: 50kHz

sensor:
  - platform: sps30
    pm_1_0:
      name: "PM <1µm Weight"
      id: "PM_1_0"
    pm_2_5:
      name: "PM <2.5µm Weight"
      id: "PM_2_5"
    pm_4_0:
      name: "PM <4µm Weight"
      id: "PM_4_0"
    pm_10_0:
      name: "PM <10µm Weight"
      id: "PM_10_0"
    pmc_0_5:
      name: "PM <0.5µm Number"
      id: "PMC_0_5"
    pmc_1_0:
      name: "PM <1µm Number"
      id: "PMC_1_0"
    pmc_2_5:
      name: "PM <2.5µm Number"
      id: "PMC_2_5"
    pmc_4_0:
      name: "PM <4µm Number"
      id: "PMC_4_0"
    pmc_10_0:
      name: "PM <10µm Number"
      id: "PMC_10_0"
    pm_size:
      name: "Typical Particle size"
      id: "pm_size"
    address: 0x69
    update_interval: 10s
    idle_interval: 5min
  - platform: aqi
    name: "Air Quality Index"
    pm_2_5: PM_2_5
    pm_10_0: PM_10_0
    calculation_type: AQI
